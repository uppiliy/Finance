{% extends 'FinanceApp/base.html' %}
{% block title %}Add Capital - Sri Uppiliyappa Finance{% endblock %}

{% block content %}

<div class="app-header">💰 Add Capital</div>

<a href="{% url 'capital_history' %}" class="btn btn-outline-primary w-100 mb-3">
    View Capital History
</a>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-gradient w-100 mt-3">
        Record Capital
    </button>
</form>
{% endblock %}
