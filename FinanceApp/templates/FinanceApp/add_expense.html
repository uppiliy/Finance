{% extends 'FinanceApp/base.html' %}
{% block title %}Add Expense - Sri Uppiliyappa Finance{% endblock %}

{% block content %}
<div class="app-header">💸 Add Expense</div>

<a href="{% url 'expense_history' %}" class="btn btn-outline-danger w-100 mb-3">
    View Expense History
</a>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-gradient w-100 mt-3">
        Record Expense
    </button>
</form>
{% endblock %}
